# fCapture 기본 설정 (~/.fCapture/default.yml)
# 이 파일을 수정하면 {~/.fCapture/default.yml} 참조를 사용하는 모든 설정에 적용됩니다.

# 저장 경로
capturePath: 0
capturePathArray:
  - "~/Desktop"
  - "~/Downloads"

# Screen
target:
  name: "screen"
  number: 1 # 캡처할 화면 번호 (1부터 시작, -1은 모든 화면)

# 파일명 형식 (%d: 날짜, %T: 시간, %target: 캡처 대상, %id: ID 카운터)
fileFormat: "%d_%T_%target"

# 출력 형식 (text / json / onlyPath)
result: "text"

# 윈도우 그림자 포함 여부 (true / false)
shadow: false

# 캡처 후 윈도우 플래시 피드백 (true / false)
window_flash: true

# 백업 스크린 저장 경로 (비워두면 비활성화)
backupOtherScreen: "~/Pictures/fCaptureBackup"
